# systemd-resolved drop-in: AD .local routing
#
# Disables mDNS/LLMNR and explicitly routes corp.local queries to upstream DNS.
# Required on any Linux host joining the corp.local AD environment because
# the .local TLD is reserved for Multicast DNS (RFC 6762) by default.
#
# Installation:
#   sudo mkdir -p /etc/systemd/resolved.conf.d
#   sudo cp no-mdns.conf /etc/systemd/resolved.conf.d/no-mdns.conf
#   sudo systemctl restart systemd-resolved
#   sudo resolvectl flush-caches
#
# Verification:
#   nslookup corp.local                           # should return DC IP
#   nslookup -type=SRV _ldap._tcp.corp.local      # should return SRV records
 
[Resolve]
DNS=10.0.1.4
Domains=~corp.local
MulticastDNS=no
LLMNR=no
 
